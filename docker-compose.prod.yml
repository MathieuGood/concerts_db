services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.frontend.prod
    ports:
      - "127.0.0.1:8082:80"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    expose:
      - "8000"
    env_file:
      - backend/.env
    volumes:
      - ./data:/data
