name: 🚀 Deploy to VPS

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.2.0
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  script: |
                      if [ ! -d ~/apps/concerts_db ]; then
                          git clone https://github.com/MathieuGood/concerts_db ~/apps/concerts_db
                      fi
                      cd ~/apps/concerts_db
                      git fetch origin
                      git checkout main
                      git reset --hard origin/main
                      if [ ! -f backend/.env ]; then
                          echo 'DATABASE_URI=sqlite+pysqlite:////data/concerts_db.sqlite' > backend/.env
                          echo 'TEST_DATABASE_URI=sqlite:///:memory:' >> backend/.env
                          echo 'DEMO_MODE=FALSE' >> backend/.env
                          echo 'PYTHONPATH=src' >> backend/.env
                          echo 'SECRET_KEY=${{ secrets.SECRET_KEY }}' >> backend/.env
                      fi
                      grep -q SECRET_KEY backend/.env || echo 'SECRET_KEY=${{ secrets.SECRET_KEY }}' >> backend/.env
                      mkdir -p data backups
                      docker compose -f docker-compose.prod.yml up -d --build
